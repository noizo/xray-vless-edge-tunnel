name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      k8s: ${{ steps.filter.outputs.k8s }}
      scripts: ${{ steps.filter.outputs.scripts }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - 'cmd/admin/**'
            k8s:
              - 'deployments/kubernetes/**'
              - 'examples/**'
            scripts:
              - 'scripts/**'
            workflows:
              - '.github/workflows/**'

  lint:
    name: Lint (shell, actions, k8s)
    needs: [changes]
    if: needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflows == 'true' || needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck
        if: needs.changes.outputs.scripts == 'true'
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts
          severity: warning
      - name: Actionlint
        if: needs.changes.outputs.workflows == 'true'
        uses: raven-actions/actionlint@v2
      - name: Kubeconform
        if: needs.changes.outputs.k8s == 'true'
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin
          find deployments/kubernetes -name '*.yaml' -not -name 'kustomization.yaml' \
            -exec kubeconform -strict -summary \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              -ignore-missing-schemas {} +

  go:
    name: Go (lint, vulncheck)
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: cmd/admin/go.mod
          cache-dependency-path: cmd/admin/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: cmd/admin
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: cmd/admin

  security:
    name: Security (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          severity: HIGH,CRITICAL
          exit-code: 1

  codeql:
    name: CodeQL (SAST)
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: cmd/admin/go.mod
          cache-dependency-path: cmd/admin/go.sum
      - uses: github/codeql-action/init@v4
        with:
          languages: go
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
